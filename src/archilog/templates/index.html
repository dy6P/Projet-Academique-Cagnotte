<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Money Pots Dashboard</title>
</head>
<body>
    <h1>Money Pots Dashboard</h1>

    <h2>New Money Pot</h2>
    <form action="{{ url_for('add_expense_route') }}" method="post">
        <input type="text" name="money_pot_name" placeholder="Money Pot Name" required>
        <input type="text" name="participant_name" placeholder="Participant Name" required>
        <input type="number" step="0.01" min="0.0" name="amount" placeholder="Amount" required>
        <button type="submit">Create Money Pot</button>
    </form>

    <h2>View Money Pot</h2>
    <form action="{{ url_for('describe_money_pot_route') }}" method="post">
        <select name="money_pot_name" required>
            {% for mp in money_pots %}
            <option value="{{ mp.name }}">{{ mp.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">View</button>
    </form>

    <h2>Delete Money Pot</h2>
    <form action="{{ url_for('delete_money_pot_route') }}" method="post">
        <select name="money_pot_name" required>
            {% for mp in money_pots %}
            <option value="{{ mp.name }}">{{ mp.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Delete</button>
    </form>
</body>
</html>
