<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Money Pots</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style1.css') }}">
</head>
<body>
    <h2>New Money Pot</h2>
    <form action="{{ url_for('web_ui.add_expense_route') }}" method="post">
        <input type="text" name="money_pot_name" placeholder="Money Pot Name" required>
        <input type="text" name="participant_name" placeholder="Participant Name" required>
        <input type="number" step="0.01" min="0.0" name="amount" placeholder="Amount" required>
        <button type="submit">Create Money Pot</button>
    </form>
    {% if money_pots | length > 0 %}
    <h2>View Money Pot</h2>
    <form action="{{ url_for('web_ui.describe_money_pot_route') }}" method="get">
        <select name="money_pot_name" required>
            {% for mp in money_pots %}
            <option value="{{ mp.name }}">{{ mp.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">View</button>
    </form>

    <h2>Delete Money Pot</h2>
    <form action="{{ url_for('web_ui.delete_money_pot_route') }}" method="post">
        <select name="money_pot_name" required>
            {% for mp in money_pots %}
            <option value="{{ mp.name }}">{{ mp.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Delete</button>
    </form>
    {% endif %}
</body>
</html>
